<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo">Notas por Materias</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Materias</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="subject-container">
    <ion-card *ngFor="let subject of subjects" class="subject-card" [style.--subject-color]="subject.color">
      <ion-card-header (click)="abrir_lista_notas(subject)">
        <ion-card-title>{{ subject.name }}</ion-card-title>
      </ion-card-header>
      <ion-item>
        <ion-button fill="clear" color="danger" slot="end" (click)="deleteSubject(subject)">
          <ion-icon name="trash" slot="icon-only" class="delete-icon"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-card>

    <div *ngIf="subjects.length === 0" class="empty-subjects-card">
      <ion-card-content class="empty-content">
        <ion-icon name="book-outline" class="empty-icon"></ion-icon>
        <p class="empty-text">No hay materias aún. ¡Crea una para comenzar!</p>
      </ion-card-content>
    </div>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button id="open-modal-materias" class="agregar">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal trigger="open-modal-materias">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="cancelar()">Cancelar</ion-button>
          </ion-buttons>
          <ion-title>Nueva Materia</ion-title>
          <ion-buttons slot="end">
            <ion-button [strong]="true" (click)="aceptar()" class="modal_buttons">Guardar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <ion-card class="form-card">
          <ion-card-content>
            <ion-item class="form-item">
              <ion-label position="stacked">Nombre de la Materia</ion-label>
              <ion-input type="text" [(ngModel)]="newSubjectName" placeholder="Ej. Programación 1"></ion-input>
            </ion-item>

            <ion-item class="form-item">
              <ion-label position="stacked">Color</ion-label>
              <ion-input type="color" [(ngModel)]="newSubjectColor"></ion-input>
            </ion-item>
          </ion-card-content>
        </ion-card>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
