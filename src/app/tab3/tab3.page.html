<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo">
      Tareas por hacer - {{ fechaactual | date: 'dd/MM/yyyy' }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense"></ion-header>

  <!-- Lista de tareas dinámica -->
  @for (tarea of tareas; track tarea.id) {
    <ion-card>
      <ion-item>
        <ion-checkbox [checked]="tarea.completada === 1" 
                      (ionChange)="toggleCompletada(tarea)">
          {{ tarea.descripcion }}
        </ion-checkbox>
      </ion-item>
      <ion-item>
        <ion-icon name="trash" (click)="eliminarTarea(tarea)" style="cursor: pointer;"></ion-icon>
        <ion-label>{{ tarea.fecha | date: 'dd/MM/yyyy' }}</ion-label>
        <ion-label>{{ tarea.hora }}</ion-label>
      </ion-item>
    </ion-card>
  }

  <!-- Mensaje cuando no hay tareas -->
  @if (tareas.length === 0) {
    <ion-card>
      <ion-item>
        <ion-label class="ion-text-center">No hay tareas pendientes</ion-label>
      </ion-item>
    </ion-card>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button id="open-modal-tareas" class="agregar">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Modal para agregar tarea -->
 <!--modal para agregar una tarea-->
<ion-modal trigger="open-modal-tareas" #modalTarea>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title class="titulo">Nueva Tarea</ion-title>
        <ion-button slot="end" (click)="aceptar()" class="modal_buttons">Aceptar</ion-button>
        <ion-button slot="start" (click)="cancelar()" class="modal_buttons">Cancelar</ion-button>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <ion-item>
        <ion-input 
          type="text" 
          placeholder="Descripción de la tarea"
          [(ngModel)]="nuevaDescripcion">
        </ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="stacked">Fecha</ion-label>
        <ion-datetime 
          presentation="date"
          [(ngModel)]="nuevaFecha"
          [value]="nuevaFecha">
        </ion-datetime>
      </ion-item>
      
      <ion-item>
        <ion-label position="stacked">Hora</ion-label>
        <ion-datetime 
          presentation="time"
          [(ngModel)]="nuevaHora"
          [value]="nuevaHora">
        </ion-datetime>
      </ion-item>
    </ion-content>
  </ng-template>
</ion-modal>



</ion-content>
