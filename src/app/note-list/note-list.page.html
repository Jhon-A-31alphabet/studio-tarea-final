
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="regresar_a_materias()" class="back-button">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="titulo">{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Notas</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="note-list-container">
    <ion-card *ngFor="let note of notes" (click)="abrir_bloc_notas(note)" class="note-item-card">
      <ion-card-header>
        <ion-card-title>{{ note.title }}</ion-card-title>
        <ion-card-subtitle *ngIf="note.createdAt">Creada: {{ formatDate(note.createdAt) }}</ion-card-subtitle>
        <ion-card-subtitle *ngIf="note.updatedAt && note.updatedAt !== note.createdAt">Editada: {{ formatDate(note.updatedAt) }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>{{ note.content.substring(0, 100) }}...</ion-card-content>
      <ion-item class="note-actions">
        <ion-button fill="clear" color="danger" slot="end" (click)="deleteNote(note); $event.stopPropagation()">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-card>

    <div *ngIf="notes.length === 0" class="empty-state-card">
      <ion-card-content class="empty-state-content">
        <ion-icon name="document-text-outline" class="empty-state-icon"></ion-icon>
        <p class="empty-state-text">No hay notas para esta materia aún. ¡Crea una!</p>
      </ion-card-content>
    </div>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="abrir_bloc_notas()" class="add-note-button">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
