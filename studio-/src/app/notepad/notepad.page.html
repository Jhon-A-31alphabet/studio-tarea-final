<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo">Bloc de notas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">notepad</ion-title>
    </ion-toolbar>
  </ion-header>


  <ion-item>
  <ion-icon name= "arrow-back-outline" (click)="regresar_a_lista_notas()"></ion-icon>
</ion-item>

<ion-textarea label="Titulo" labelPlacement="floating" fill="outline" placeholder="Escribe el titulo aqui" id="text_area_titulo"></ion-textarea>


<ion-item>
  <ion-textarea
    placeholder="Escribe algo aqui"
    [autoGrow]="true" id="text_area_nota">
  </ion-textarea>
</ion-item>


</ion-content>
