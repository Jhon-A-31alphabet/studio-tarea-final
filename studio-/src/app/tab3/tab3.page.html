<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo">
              Tareas por hacer   -    {{ fechaactual | date: 'dd/MM/yyyy' }}  
              <!-- a traves del view engine de angular se puede cargar la fecha actual y mostrarla dinamicamene
               en el html, ( revisar el archivo tab3.page.ts)-->


    </ion-title>
  </ion-toolbar>
</ion-header>


<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
  </ion-header>

<!-- las tareas o eventos deberan guardarse en la base de datos sqlite y con el taskscheduler de capacitor (capacitor notification) para asi mostrarse el dia y hora acordado,
 ademas,estas deberan cargarse y mostrarse, usando el view engine de angular-->


<!-- los ioncards mostrados aqui son de ejemplo de como deberian de verse las tareas y las clases y paramtros que llevan-->
  <ion-card *ngFor="let task of tasks">
    <ion-item>
      <ion-checkbox [(ngModel)]="task.completed" (ionChange)="toggleTask(task)">{{ task.description }}</ion-checkbox>
    </ion-item>
    <ion-item>
      <ion-icon name="trash" (click)="deleteTask(task)"></ion-icon>  <!-- este icono debera eliminar la tarea tanto de la interfaz como del taskscheduler del sistema operativo(capacitor notf.) y la base de datos-->
      <ion-label>{{ task.date }}</ion-label> <!--aqui se muestra la fecha-->
      <ion-label>{{ task.time }}</ion-label> <!--aqui la hora-->
    </ion-item>
  </ion-card>





  <ion-fab slot="fixed" vertical="bottom" horizontal="end">   <!--este es el boton el cual entra a un modal para agregar una tarea-->
    <ion-fab-button  id="open-modal-tareas" class="agregar">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>



<!--modal para agregar una tarea-->

  <ion-modal trigger="open-modal-tareas">
    <ng-template>
      <ion-header>
        <ion-toolbar>

            <ion-title class="titulo">Nueva Tarea</ion-title>

            <ion-button [strong]="true" (click)="aceptar()" expand="full" class="modal_buttons">Aceptar</ion-button>
            <ion-button (click)="cancelar()" expand="full" class="modal_buttons">Cancelar</ion-button>

            <!-- la definicion y uso que le daras a los botones cancelar y aceptar estan en el archivo tab3.page.ts-->


        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <ion-item>
          
          <ion-label position="stacked">Descripción</ion-label>
          <ion-input type="text" [(ngModel)]="newTaskDescription" placeholder="cocinar la cena"></ion-input>
        </ion-item>
        <ion-datetime [(ngModel)]="newTaskDateTime" class="datetime_style" color="primary"></ion-datetime>
        <ion-item>
         
        </ion-item>
      </ion-content>
    </ng-template>
  </ion-modal>



</ion-content>
