<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
              Tareas por hacer   -    {{ fechaactual | date: 'dd/MM/yyyy' }} 
    </ion-title>
  </ion-toolbar>
</ion-header>


<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
  </ion-header>

  <!--  las tareas deben cargarse dinamicamente, estas debeen estas almacenadas-->
    <!--eso es a eleccion de yamell-->




  <ion-card>
    <ion-item>
      <ion-checkbox>Descripcion de la Tarea</ion-checkbox>
    </ion-item>
  

    <ion-item>
      <ion-icon name="trash"></ion-icon>

      <ion-label>08/04/2026</ion-label>
      <ion-label>07:40</ion-label>

    </ion-item>

   
  </ion-card>



   <ion-card>
    <ion-item>
      <ion-checkbox>Descripcion de la tarea</ion-checkbox>
    </ion-item>
    

    <ion-item>
      <ion-icon name="trash"></ion-icon>
      <ion-label>08/04/2026</ion-label>
      <ion-label>07:40</ion-label>


    </ion-item>
  </ion-card>











  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button color="primary" id="open-modal-tareas">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
















  <ion-modal trigger="open-modal-tareas">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-button slot="start">
            <ion-button (click)="cancelar()">Cancelar</ion-button>
          </ion-button>
          <ion-title>Nueva Tarea</ion-title>
          <ion-button slot="end">
            <ion-button [strong]="true" (click)="aceptar()">Aceptar</ion-button>
          </ion-button>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <ion-item>
          
          <ion-label position="stacked"></ion-label>
          <ion-input type="text" placeholder="cocinar la cena"></ion-input>
        </ion-item>
        <ion-datetime></ion-datetime>
        <ion-item>
         
        </ion-item>
      </ion-content>
    </ng-template>
  </ion-modal>



</ion-content>
